<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>张雪峰知识助手</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{brand:{50:"#eff6ff",500:"#3b82f6",600:"#2563eb",700:"#1d4ed8"}}}}}</script>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="h-full bg-white">
<div id="app" class="flex h-full overflow-hidden">
<aside id="sidebar" class="flex flex-col w-72 bg-slate-900 text-white shrink-0 transition-all duration-300 overflow-hidden">
<div class="flex items-center justify-between px-4 py-4 border-b border-slate-700/50">
<span class="text-lg font-bold tracking-wide bg-gradient-to-r from-blue-400 to-cyan-300 bg-clip-text text-transparent">张雪峰老师</span>
<button id="collapse-btn" class="text-slate-400 hover:text-white transition-colors p-1.5 rounded-lg hover:bg-slate-800">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/></svg>
</button></div>
<div class="px-3 pt-3 pb-2"><input id="search-input" type="text" placeholder="搜索对话..." class="w-full px-4 py-2 text-sm bg-slate-800 border border-slate-700 rounded-full text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-transparent transition-all"></div>
<button id="new-session" class="mx-3 mb-3 px-4 py-2.5 text-sm border border-slate-600/50 rounded-full text-slate-300 hover:bg-slate-800 hover:text-white hover:border-slate-500 transition-all text-left">+ 新对话</button>
<div id="session-list" class="flex-1 overflow-y-auto px-2 py-1 space-y-0.5"></div>
</aside>
<main id="main" class="flex-1 flex flex-col bg-gray-50 min-w-0">
<div id="brand" class="flex-1 flex flex-col items-center justify-center pb-24">
<div class="text-3xl font-bold text-slate-800 mb-3">张雪峰老师</div>
<p id="brand-text" class="text-gray-400 text-sm">使用智能问答开始对话</p></div>
<div class="flex justify-center gap-2 px-4 py-3">
<button class="mode-btn active px-4 py-1.5 text-sm rounded-full font-medium transition-all bg-blue-600 text-white shadow-md shadow-blue-600/20" data-mode="agent">智能问答</button>
<button class="mode-btn px-4 py-1.5 text-sm rounded-full font-medium text-gray-500 hover:text-gray-700 hover:bg-gray-200/80 transition-all" data-mode="volunteer">志愿评估</button>
<button class="mode-btn px-4 py-1.5 text-sm rounded-full font-medium text-gray-500 hover:text-gray-700 hover:bg-gray-200/80 transition-all" data-mode="quote">语录搜索</button></div>
<div id="chat-messages" class="flex-1 overflow-y-auto px-4 py-3 space-y-4"></div>
<div id="tool-panel" class="flex-1 overflow-y-auto px-4 py-6" style="display:none"></div>
<div id="input-bar" class="px-4 py-3 bg-white border-t border-gray-100">
<div class="max-w-3xl mx-auto flex items-center gap-3">
<input id="msg-input" type="text" placeholder="输入你的问题..." class="flex-1 px-5 py-3 bg-gray-100 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all">
<button id="send-btn" class="shrink-0 w-10 h-10 bg-blue-600 hover:bg-blue-700 text-white rounded-full flex items-center justify-center transition-colors shadow-md shadow-blue-600/20 active:scale-95">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
</button></div></div></main></div>
<script src="/static/js/utils.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/sidebar.js"></script>
<script src="/static/js/chat.js"></script>
<script src="/static/js/app.js"></script>
</body></html>
